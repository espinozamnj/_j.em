<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>var allIcons = {};</script>
    <script src="all-fa-cs.js"></script>
    <title>export font icons</title>
</head>
<body>
    <div id="gallery">
        <i class="fas fa-football-ball"></i>
    </div>
    <script>
        window.addEventListener('load', function() {
            let lib = allIcons.libray
            console.log(lib)
            for (const icn in lib) {
                if (Object.hasOwnProperty.call(lib, icn)) {
                    let icon = lib[icn]
                    let i = document.createElement('a')
                    i.className = 'fas fa-' + icn
                    document.getElementById('gallery').appendChild(i)
                }
            }
        })
    </script>
</body>
</html>
