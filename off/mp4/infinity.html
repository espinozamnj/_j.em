<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Infinite screen</title>
    <link rel="icon" type="image/png" href="/_cdn_/favs/wait-room.192.png">
    <script src="/_cdn_/rm-wbha.js"></script>
    <link rel="stylesheet" href="infinity.css">
</head>
<body>
    <div class="app">
        <div class="mouse-cursor cursor-outer"></div>
        <div class="root">
            <div class="main">
                <div class="message opacity-an" id="fullscreen">
                    <p>EQUIPO TRABAJANDO</p>
                    <p>NO APAGAR</p>
                </div>
                <div class="animation opacity-an">
                    <div class="container">
                        <div class="support"><div class="dot"></div></div>
                        <div class="support"><div class="dot"></div></div>
                        <div class="support"><div class="dot"></div></div>
                        <div class="support"><div class="dot"></div></div>
                        <div class="support"><div class="dot"></div></div>
                        <div class="support"><div class="dot"></div></div>
                        <p class="txt">Espere</p>
                    </div>
                </div>
                <video src="bar.mp4" autoplay="true" preload loop class="video"></video>
            </div>
        </div>
        <div class="sjs">
            <script>
                (function(){
                    let cursor_e = document.getElementsByClassName('cursor-outer')[0]
                    if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                        cursor_e.classList.add('hidden')
                    } else {
                        if (1 == 2) {
                            window.addEventListener('mousemove', function(event) {
                                cursor_e.style.left = event.clientX + 5 + "px"
                                cursor_e.style.top = event.clientY + 5 + "px"
                            })
                        } else {
                            cursor_e.classList.add('hidden')
                        }
                    }
                    document.getElementById('fullscreen').addEventListener('click', function() {
                        if (document.fullscreenElement == null) {
                            document.documentElement.requestFullscreen()
                        } else {
                            document.exitFullscreen()
                        }
                    })
                })();
                window.addEventListener('load', function(){
                    let v = document.getElementsByTagName('video')[0]
                    v.muted = true
                    v.play()
                    v.addEventListener('click', function(event) {
                        event.preventDefault()
                        setTimeout(function() {
                            v.play()
                        }, 5e2)
                        if (v.hasAttribute('controls')) {
                            v.removeAttribute('controls')
                        } else {
                            v.setAttribute('controls', '')
                        }
                    })
                    v.addEventListener('dblclick', function() {
                        document.fullscreenElement == v ? document.exitFullscreen() : v.requestFullscreen()
                    })
                })
            </script>
        </div>
    </div>
</body>
</html>
